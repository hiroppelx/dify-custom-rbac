# Custom Nginx Configuration for Dify RBAC
# Additional API endpoint protection at network level

upstream dify-api {
    server api:5001;
}

upstream dify-web {
    server web:3000;
}

# Rate limiting for log endpoints
limit_req_zone $binary_remote_addr zone=logs_rate_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;
    client_max_body_size 15M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend routes
    location / {
        proxy_pass http://dify-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # API routes
    location /console/api {
        proxy_pass http://dify-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /v1 {
        proxy_pass http://dify-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Additional protection for log endpoints (rate limiting)
    location ~ ^/console/api/apps/[^/]+/(workflow-app-logs|chat-conversations|completion-conversations) {
        # Apply rate limiting to log endpoints
        limit_req zone=logs_rate_limit burst=5 nodelay;
        
        # Optional: IP whitelist for log access (uncomment and configure as needed)
        # allow 10.0.0.0/8;     # Internal network
        # allow 172.16.0.0/12;  # Internal network
        # allow 192.168.0.0/16; # Internal network
        # deny all;
        
        proxy_pass http://dify-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Log access attempts to log endpoints
        access_log /var/log/nginx/dify_log_access.log combined;
    }

    # WebSocket support for real-time features
    location /ws {
        proxy_pass http://dify-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoints
    location /health {
        access_log off;
        proxy_pass http://dify-api;
        proxy_set_header Host $host;
    }

    # Static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://dify-web;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 403 /403.html;
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
    }
}

