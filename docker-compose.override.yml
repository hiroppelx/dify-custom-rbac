# Docker Compose Override for Custom RBAC Dify
# This file overrides the default Dify services with custom RBAC images
version: '3'

services:
  # Custom API service with RBAC modifications
  api:
    build:
      context: ../dify  # Point to the main Dify directory
      dockerfile: ../dify-custom-rbac/Dockerfile.api
    image: dify-api-custom-rbac:latest
    environment:
      # Add custom environment variable to identify RBAC version
      - DIFY_RBAC_VERSION=1.0.0
      - DIFY_RBAC_ENABLED=true
    labels:
      - "dify.rbac.enabled=true"
      - "dify.rbac.version=1.0.0"

  # Custom Web service with RBAC modifications  
  web:
    build:
      context: ../dify  # Point to the main Dify directory
      dockerfile: ../dify-custom-rbac/Dockerfile.web
    image: dify-web-custom-rbac:latest
    environment:
      # Add custom environment variable to identify RBAC version
      - DIFY_RBAC_VERSION=1.0.0
      - DIFY_RBAC_ENABLED=true
    labels:
      - "dify.rbac.enabled=true"
      - "dify.rbac.version=1.0.0"

  # Optional: Add a custom nginx configuration for additional API protection
  nginx:
    volumes:
      # Mount custom nginx config if available
      - ./nginx.custom.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "dify.rbac.proxy=true"