name: shellcheck

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure shellcheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Run shellcheck on all shell scripts
        run: |
          shopt -s nullglob
          files=( ./*.sh )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          printf 'Linting:\n'
          printf '  %s\n' "${files[@]}"
          shellcheck "${files[@]}"
